name: ai_ops_env
version: 2.0.0
description: >
  AI-driven incident-response environment. An autonomous agent observes
  a production system under stress and applies remediation actions to
  restore all services to a healthy state within a step budget.

observation_space:
  incident_id:        { type: string }
  services:           { type: dict,  description: "map of service_name → status (healthy|down|degraded)" }
  cpu_usage:          { type: float, range: [0, 100] }
  memory_usage:       { type: float, range: [0, 100] }
  error_rate:         { type: float, range: [0, 1] }
  latency_ms:         { type: float, range: [0, ∞] }
  incident_severity:  { type: int,   range: [1, 3],  description: "1=low, 2=medium, 3=high" }
  alert_count:        { type: int,   range: [0, ∞] }
  logs:               { type: list[string] }
  step_count:         { type: int }

observation_vector:
  description: "Normalised 12-float vector for neural-network agents"
  dim: 12
  encoding:
    - cpu_usage / 100
    - memory_usage / 100
    - error_rate
    - latency_ms / 2000  (clamped to 1.0)
    - auth_service_healthy  (1=healthy, 0=down/degraded)
    - api_service_healthy
    - db_service_healthy
    - cache_service_healthy
    - step_count / MAX_STEPS
    - incident_severity / 3
    - alert_count / 10  (clamped to 1.0)
    - restart_budget / MAX_RESTARTS

action_space:
  action_type:
    type: string
    enum: ["restart_service", "scale_up", "rollback", "flush_cache", "escalate", "noop"]
  target:
    type: string
    nullable: true
    description: "Required for restart_service. One of: auth-service, api, db, cache"

reward_range: [-1.0, 1.0]
reward_shaping:
  restart_service_success: +0.35
  scale_up:                +0.25
  rollback:                +0.40
  flush_cache:             +0.15
  invalid_action:          -0.05 to -0.15
  escalate:                -0.80
  per_step_health_bonus:   up to +0.15

done_conditions:
  success:
    - cpu_usage < 60
    - error_rate < 0.1
    - latency_ms < 500
    - all services == healthy
  timeout: step_count >= 20

tasks:
  - id: easy
    description: Single service down, low CPU, low error rate
    grader:
      metric: score
      range: [0.0, 1.0]
      passing_threshold: 0.5
      method: >
        Score is computed as mean per-step reward clamped to [0, 1].
        Episode passes when all services are healthy, cpu_usage < 60,
        error_rate < 0.1, and latency_ms < 500 within 20 steps.

  - id: medium
    description: CPU spike, elevated error rate and latency, all services up
    grader:
      metric: score
      range: [0.0, 1.0]
      passing_threshold: 0.4
      method: >
        Same scoring as easy. Partial credit awarded proportional to
        the improvement in cpu_usage, error_rate, and latency_ms
        relative to initial values.

  - id: hard
    description: Multi-service failure, cascading error rate, SEV-1 scenario
    grader:
      metric: score
      range: [0.0, 1.0]
      passing_threshold: 0.3
      method: >
        Same scoring as easy/medium. Agent must restore multiple downed
        services while managing cascading failures within a tighter
        restart budget. Full score requires restoring all four services.

env_vars:
  API_BASE_URL:
    description: "OpenAI-compatible API base URL for LLM inference"
    required: true
    example: "https://api.openai.com/v1"
  MODEL_NAME:
    description: "Model identifier to use for LLM inference calls"
    required: true
    example: "meta-llama/Llama-3-8b-instruct"
  HF_TOKEN:
    description: "Hugging Face / API bearer token"
    required: true
    example: "hf_xxxxxxxxxxxxxxxxxxxx"
